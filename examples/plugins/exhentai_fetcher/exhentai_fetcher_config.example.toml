# OBCX ExHentai Fetcher Plugin Configuration Example

[plugin_directories]
local = "./plugins"
build = "./build/plugins"

[bots.telegram_bot]
type = "telegram"
enabled = true
plugins = ["exhentai_fetcher"]

[bots.telegram_bot.connection]
type = "http"
host = "api.telegram.org"
port = 443
access_token = "<Your Telegram Bot Token>"
use_ssl = true
timeout = 30000

# Proxy for Telegram API (optional)
# proxy_host = "127.0.0.1"
# proxy_port = 10086
# proxy_type = "http"

[plugins.exhentai_fetcher]
enabled = true
callbacks = ["on_message"]
priority = 100

[plugins.exhentai_fetcher.config]
# ExHentai auth cookies (required) — obtain from browser DevTools after login
ipb_member_id = "<FILL ME>"
ipb_pass_hash = "<FILL ME>"
igneous = "<FILL ME>"

# HTTP target
host = "exhentai.org"
port = 443
use_ssl = true

# Proxy (set proxy_enabled = true to route exhentai requests through a proxy)
proxy_enabled = false
proxy_host = "127.0.0.1"
proxy_port = 10086
proxy_type = "http"      # "http", "https", or "socks5"
# proxy_username = ""
# proxy_password = ""

# Trigger command
command = "/exhentai"

# Connection timeout in milliseconds (default: 30000 = 30s)
timeout_ms = 30000
